<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Importar — Carros OLX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Importar Banco de Dados</h1>
  <a href="/" class="btn btn-outline-secondary mb-2">&larr; Voltar para listagem</a>

  <div class="card shadow-sm">
    <div class="card-body">
      <p class="text-muted">Selecione um arquivo .zip exportado anteriormente. Isso substituirá o banco atual.</p>
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <input type="file" name="file" class="form-control" accept=".zip" required>
        </div>
        <button type="submit" class="btn btn-warning">Importar</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
