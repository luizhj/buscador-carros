<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ brand }} — Carros OLX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <a href="/marcas" class="btn btn-outline-secondary mb-2">&larr; Voltar para marcas</a>
  <h1 class="mb-4">{{ brand }}</h1>
  <div class="list-group">
    {% for model, count in modelos %}
    <a href="/?model={{ model }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      {{ model }}
      <span class="badge bg-primary rounded-pill">{{ count }}</span>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
