<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configurar — Carros OLX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Configurar Pesquisa</h1>
  <a href="/" class="btn btn-outline-secondary mb-2">&larr; Voltar para listagem</a>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" action="/run-scrape">
        <div class="mb-3">
          <label class="form-label fw-bold">URL de pesquisa (OLX)</label>
          <input type="url" name="url" class="form-control" value="{{ current_url }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Cidades permitidas</label>
          <textarea name="cidades" class="form-control" rows="4">{{ cidades }}</textarea>
          <small class="text-muted">Uma cidade por linha. Deixe vazio para salvar todas.</small>
        </div>
        <button type="submit" formaction="/run-scrape" class="btn btn-primary">Salvar e Atualizar</button>
        <button type="submit" formaction="/run-scrape-only" class="btn btn-outline-primary">Somente atualizar anúncios</button>
      </form>
    </div>
  </div>

  <div class="d-flex gap-2 mt-3 mb-3 flex-wrap">
    <a href="/modelos-compostos" class="btn btn-outline-info">Modelos compostos</a>
    <a href="/export" class="btn btn-outline-success">⬇ Exportar banco</a>
  </div>

  <div class="card shadow-sm mt-4 border-danger">
    <div class="card-header fw-bold text-danger">Zona de Perigo</div>
    <div class="card-body">
      <p class="text-muted small">Remove todos os anúncios baixados e a lista de ignorados.</p>
      <form method="POST" action="/clear-all" onsubmit="return confirm('Tem certeza? Todos os anúncios e ignorados serão removidos permanentemente.')">
        <button type="submit" class="btn btn-danger">Limpar tudo</button>
      </form>
      <form method="POST" action="/clear-keep-favs" onsubmit="return confirm('Tem certeza? Anúncios e ignorados serão removidos. Favoritos preservados.')" class="mt-2">
        <button type="submit" class="btn btn-danger">Apagar tudo menos favoritos</button>
      </form>
      <hr>
      <p class="text-muted small">Substitui o banco atual por um arquivo .zip exportado anteriormente.</p>
      <form method="POST" action="/import" enctype="multipart/form-data">
        <div class="mb-2">
          <input type="file" name="file" class="form-control form-control-sm" accept=".zip" required>
        </div>
        <button type="submit" class="btn btn-danger">⬆ Importar banco</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
