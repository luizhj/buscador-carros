<style>
#detailsModal .modal-dialog { width:82vw; max-width:82vw; }
#detailsModal .modal-dialog-scrollable .modal-content { max-height:82vh; height:82vh; }
#detailsModal .modal-body { max-height:calc(82vh - 160px); overflow-y:auto; }
#detailsModal .row.details-row { height:100%; }
#detailsModal .details-img-col { height:100%; min-height:200px; display:flex; align-items:center; background:#f5f5f5; border-radius:4px; overflow:hidden; }
#detailsModal #det-carousel { height:100%; }
#detailsModal #det-carousel-inner .carousel-item { height:100%; transition:transform .15s ease; }
#detailsModal #det-carousel-inner .carousel-item img { width:100%; height:100%; object-fit:contain; }
#detailsModal .carousel-indicators button { width:10px; height:10px; border-radius:50%; }
#detailsModal .carousel-control-prev, #detailsModal .carousel-control-next { opacity:0; transition:opacity .2s; }
#detailsModal .details-img-col:hover .carousel-control-prev, #detailsModal .details-img-col:hover .carousel-control-next { opacity:1; }
#detailsModal .carousel-control-prev-icon, #detailsModal .carousel-control-next-icon { background-color:rgba(0,0,0,.3); border-radius:50%; padding:15px; background-size:50%; }
#detailsModal .tab-content { overflow-y:auto; flex:1; }
#detailsModal .tab-pane.active { height:100%; }
#detailsModal #tab-overview { overflow-x:hidden; }
#detailsModal #tab-overview .table { font-size:0.75em; margin-bottom:0; }
#detailsModal #tab-overview .table td, #detailsModal #tab-overview .table th { padding:4px 4px; }
#detailsModal #tab-overview .col-md-8 { overflow-x:hidden; }
#detailsModal #tab-data { overflow-x:hidden; }
#detailsModal #tab-features { overflow-x:hidden; }
#detailsModal #tab-data .bg-light { border:1px solid #eee; }
</style>
<div class="modal fade" id="detailsModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><span id="det-source-badge" class="badge me-2" style="font-size:0.55em;">OLX</span>Detalhes do Anúncio</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailsBody">
        <div class="text-center py-4" id="detailsLoading">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Buscando dados do anúncio...</p>
        </div>
        <div id="detailsContent" style="display:none;height:100%;flex-direction:column;">
          <ul class="nav nav-tabs mb-3" id="detailsTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="tab-overview-btn" data-bs-toggle="tab" data-bs-target="#tab-overview" type="button">Visão Geral</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-data-btn" data-bs-toggle="tab" data-bs-target="#tab-data" type="button">Dados do Anúncio</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-features-btn" data-bs-toggle="tab" data-bs-target="#tab-features" type="button">Opcionais</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-notes-btn" data-bs-toggle="tab" data-bs-target="#tab-notes" type="button">Observação</button></li>
          </ul>
          <div class="tab-content flex-grow-1" style="min-height:0;">
            <div class="tab-pane fade show active h-100" id="tab-overview">
              <div class="row details-row h-100">
                <div class="col-md-4 details-img-col">
                  <div id="det-carousel" class="carousel slide h-100 w-100" data-bs-ride="false">
                    <div class="carousel-inner h-100" id="det-carousel-inner"></div>
                    <button class="carousel-control-prev" type="button" onclick="detCarouselSlide('prev')" style="width:10%;">
                      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" onclick="detCarouselSlide('next')" style="width:10%;">
                      <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                    <div class="carousel-indicators" id="det-carousel-indicators" style="margin-bottom:0;"></div>
                  </div>
                </div>
                <div class="col-md-8" style="overflow-y:auto;">
                  <h5 id="det-title" class="mb-2" style="font-size:1em;"></h5>
                  <p class="text-muted small mb-2"><span id="det-city"></span><span id="det-neighborhood-sep"></span><span id="det-neighborhood"></span><span id="det-seller-sep"></span><span id="det-seller-type"></span></p>
                  <p class="text-muted small mb-2"><span id="det-steering"></span><span id="det-features-sep"></span><span id="det-features"></span></p>
                  <div class="mb-2">
                    <table class="table table-bordered table-sm text-center" style="font-size:0.75em;">
                      <thead class="table-light">
                        <tr><th>Preço Anúncio</th><th>Preço Médio OLX</th><th>Preço FIPE</th><th>Diferença FIPE</th><th>% FIPE</th></tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td id="det-listing-price" class="fw-bold"></td>
                          <td id="det-olx-avg"></td>
                          <td id="det-fipe"></td>
                          <td id="det-diff-fipe"></td>
                          <td id="det-pct-fipe"></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <h6 class="fw-bold">Descrição</h6>
                  <div id="det-description" class="p-3 bg-light rounded" style="white-space:pre-wrap;font-size:0.9em;"></div>
                </div>
              </div>
            </div>
            <div class="tab-pane fade" id="tab-data">
              <div id="det-data-table"></div>
            </div>
            <div class="tab-pane fade" id="tab-features">
              <div id="det-features-list"></div>
            </div>
            <div class="tab-pane fade h-100" id="tab-notes">
              <div class="d-flex flex-column h-100">
                <textarea id="det-notes" class="form-control flex-grow-1" style="resize:none;min-height:150px;" placeholder="Observações sobre o anúncio..."></textarea>
                <button class="btn btn-primary btn-sm mt-2 align-self-end" onclick="saveNotes()">Salvar observação</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-warning btn-sm" id="det-force-btn" onclick="openDetails(currentDetailsOlxId, currentDetailsDbId, true)" title="Buscar novamente da OLX">
          ↻ Forçar novo scrape
        </button>
        <a class="btn btn-outline-primary btn-sm" id="det-open-url" href="#" target="_blank" rel="noopener">↗ Abrir anúncio</a>
        <button class="btn btn-outline-danger btn-sm" onclick="detailsIgnore()">✕ Ignorar</button>
        <button class="btn btn-outline-danger btn-sm" id="det-fav-btn" onclick="detailsFav()">♥ Favoritar</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
<div id="det-lightbox" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.9);flex-direction:column;align-items:center;justify-content:center;">
  <button type="button" onclick="detCloseLightbox()" style="position:absolute;top:15px;right:25px;font-size:2em;color:#fff;background:none;border:none;cursor:pointer;z-index:10;">&times;</button>
  <div id="det-lb-carousel" class="carousel slide w-100 h-100" style="max-width:90vw;max-height:90vh;">
    <div class="carousel-inner h-100" id="det-lb-inner"></div>
    <button class="carousel-control-prev" type="button" onclick="detLbSlide('prev')" style="width:8%;">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    </button>
    <button class="carousel-control-next" type="button" onclick="detLbSlide('next')" style="width:8%;">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
    </button>
    <div class="carousel-indicators" id="det-lb-indicators"></div>
  </div>
</div>
<script>
var currentDetailsOlxId = null;
var currentDetailsDbId = null;
var detCarousel = null;
var detImages = [];
var detLbCarousel = null;
function detCarouselSlide(dir) { if (detCarousel) detCarousel[dir](); }
function detOpenLightbox(i) {
  var inner = document.getElementById('det-lb-inner');
  var indicators = document.getElementById('det-lb-indicators');
  inner.innerHTML = '';
  indicators.innerHTML = '';
  detImages.forEach(function(url, j) {
    var ind = document.createElement('button');
    ind.setAttribute('data-bs-target', '#det-lb-carousel');
    ind.setAttribute('data-bs-slide-to', j);
    if (j === i) ind.classList.add('active');
    indicators.appendChild(ind);
    var item = document.createElement('div');
    item.className = 'carousel-item' + (j === i ? ' active' : '');
    item.innerHTML = '<img src="/img-proxy?url=' + encodeURIComponent(url) + '" class="d-block w-100" style="height:90vh;object-fit:contain;">';
    inner.appendChild(item);
  });
  if (detLbCarousel) detLbCarousel.dispose();
  detLbCarousel = new bootstrap.Carousel(document.getElementById('det-lb-carousel'));
  detLbCarousel.to(i);
  document.getElementById('det-lightbox').style.display = 'flex';
}
function detLbSlide(dir) { if (detLbCarousel) detLbCarousel[dir](); }
function detCloseLightbox() { document.getElementById('det-lightbox').style.display = 'none'; }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') detCloseLightbox(); });
function _brl(v) {
  if (v == null) return '-';
  return 'R$ ' + (v / 100).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function openDetails(olxId, dbId, force) {
  currentDetailsOlxId = olxId;
  currentDetailsDbId = dbId;
  document.getElementById('detailsLoading').style.display = '';
  document.getElementById('detailsContent').style.display = 'none';
  document.getElementById('det-force-btn').disabled = true;
  var favBtn = document.getElementById('det-fav-btn');
  var favIcon = document.getElementById('fav-' + dbId);
  if (favIcon) {
    favBtn.textContent = favIcon.style.color === 'red' ? '♥ Favoritado' : '♡ Favoritar';
  } else {
    favBtn.textContent = '♡ Favoritar';
  }
  document.getElementById('detailsTabs').querySelectorAll('.nav-link').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('detailsContent').querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('show', 'active'); });
  document.getElementById('tab-overview-btn').classList.add('active');
  document.getElementById('tab-overview').classList.add('show', 'active');
  var modal = bootstrap.Modal.getOrCreateInstance('#detailsModal');
  modal.show();
  var url = '/scrape-details/' + olxId;
  if (force) url += '?force=1';
  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    document.getElementById('detailsLoading').style.display = 'none';
    document.getElementById('detailsContent').style.display = 'flex';
    document.getElementById('det-force-btn').disabled = false;
    document.getElementById('det-listing-price').textContent = _brl(data.listing_price);
    document.getElementById('det-olx-avg').textContent = _brl(data.olx_avg_price);
    document.getElementById('det-fipe').textContent = _brl(data.fipe_price);
    var diff = data.fipe_price != null && data.listing_price != null ? data.listing_price - data.fipe_price : null;
    var diffEl = document.getElementById('det-diff-fipe');
    var pctEl = document.getElementById('det-pct-fipe');
    if (diff != null) {
      var sign = diff > 0 ? '+' : diff < 0 ? '−' : '';
      diffEl.textContent = sign + _brl(Math.abs(diff));
      diffEl.className = diff > 0 ? 'text-success fw-bold' : diff < 0 ? 'text-danger fw-bold' : '';
      var pct = data.fipe_price ? (diff / data.fipe_price * 100) : 0;
      pctEl.textContent = (diff > 0 ? '+' : diff < 0 ? '−' : '') + Math.abs(pct).toFixed(1) + '%';
      pctEl.className = diff > 0 ? 'text-success fw-bold' : diff < 0 ? 'text-danger fw-bold' : '';
    } else {
      diffEl.textContent = '-';
      diffEl.className = '';
      pctEl.textContent = '-';
      pctEl.className = '';
    }
    document.getElementById('det-title').textContent = data.title || '';
    var badge = document.getElementById('det-source-badge');
    if (badge) {
      badge.textContent = data.source === 'socarrao' ? 'SóCarrão' : 'OLX';
      badge.className = 'badge me-2';
      badge.style.fontSize = '0.55em';
      if (data.source === 'socarrao') {
        badge.style.backgroundColor = '#dc3545';
        badge.style.color = '#fff';
      } else {
        badge.style.backgroundColor = '#0d6efd';
        badge.style.color = '#fff';
      }
    }
    var kmEl = document.getElementById('det-title');
    if (data.mileage != null) kmEl.textContent += ' — ' + data.mileage.toLocaleString('pt-BR') + ' km';
    var loc = [];
    if (data.city) loc.push(data.city);
    if (data.neighborhood) loc.push(data.neighborhood);
    document.getElementById('det-city').textContent = loc.join(' — ');
    document.getElementById('det-neighborhood-sep').textContent = '';
    document.getElementById('det-neighborhood').textContent = '';
    if (data.seller_type) {
      document.getElementById('det-seller-sep').textContent = loc.length ? ' | ' : '';
      document.getElementById('det-seller-type').textContent = data.seller_type.charAt(0).toUpperCase() + data.seller_type.slice(1);
    } else {
      document.getElementById('det-seller-sep').textContent = '';
      document.getElementById('det-seller-type').textContent = '';
    }
    document.getElementById('det-description').textContent = data.description || '(sem descrição)';
    document.getElementById('det-notes').value = data.notes || '';
    var steering = data.car_steering;
    var feats = data.car_features || [];
    var hasAr = feats.some(function(f) { return typeof f === 'string' && f.toLowerCase() === 'ar condicionado'; });
    var parts = [];
    if (steering) parts.push('Direção: ' + steering);
    if (hasAr) parts.push('Ar condicionado');
    document.getElementById('det-steering').textContent = parts.join(' | ') || '';
    document.getElementById('det-features-sep').textContent = '';
    document.getElementById('det-features').textContent = '';
    feats.sort(function(a, b) { return a.localeCompare(b); });
    var featHtml = feats.length ? '<div class="row g-2">' + feats.map(function(f) {
      return '<div class="col-md-4"><div class="p-2 bg-light rounded" style="font-size:0.85em;">' + f + '</div></div>';
    }).join('') + '</div>' : '<p class="text-muted">Nenhum opcional informado.</p>';
    document.getElementById('det-features-list').innerHTML = featHtml;
    document.getElementById('det-open-url').href = data.listing_url || '#';
    detImages = data.image_urls && data.image_urls.length ? data.image_urls : (data.image_url ? [data.image_url] : []);
    var carouselEl = document.getElementById('det-carousel');
    var indicators = document.getElementById('det-carousel-indicators');
    var inner = document.getElementById('det-carousel-inner');
    indicators.innerHTML = '';
    inner.innerHTML = '';
    if (detImages.length > 1) {
      detImages.forEach(function(url, i) {
        var ind = document.createElement('button');
        ind.setAttribute('data-bs-target', '#det-carousel');
        ind.setAttribute('data-bs-slide-to', i);
        if (i === 0) ind.classList.add('active');
        indicators.appendChild(ind);
        var item = document.createElement('div');
        item.className = 'carousel-item' + (i === 0 ? ' active' : '');
        item.innerHTML = '<img src="/img-proxy?url=' + encodeURIComponent(url) + '" class="d-block w-100" loading="lazy" style="cursor:zoom-in;" onclick="detOpenLightbox(' + i + ')">';
        inner.appendChild(item);
      });
      carouselEl.style.display = '';
      if (detCarousel) detCarousel.dispose();
      detCarousel = new bootstrap.Carousel(carouselEl);
    } else if (detImages.length === 1) {
      var item = document.createElement('div');
      item.className = 'carousel-item active';
      item.innerHTML = '<img src="/img-proxy?url=' + encodeURIComponent(detImages[0]) + '" class="d-block w-100" style="cursor:zoom-in;" onclick="detOpenLightbox(0)">';
      inner.appendChild(item);
      carouselEl.querySelectorAll('[data-bs-slide], .carousel-indicators').forEach(function(b) { b.style.display = 'none'; });
    }
    document.getElementById('det-carousel').style.display = detImages.length ? '' : 'none';
    var dataRows = [
      ['Marca', data.brand],
      ['Modelo', data.model],
      ['Ano', data.year],
      ['KM', data.mileage != null ? data.mileage.toLocaleString('pt-BR') : '-'],
      ['Combustível', data.fuel],
      ['Câmbio', data.transmission],
      ['Tipo', data.cartype],
      ['Motor', data.motorpower],
      ['Cor', data.color],
      ['Vendedor', data.seller_name],
      ['Tipo Vendedor', data.seller_type],
      ['Data anúncio', data.listing_date ? data.listing_date.slice(0, 10) : '-'],
      ['CEP', data.zip_code],
      ['Criado em', data.created_at ? data.created_at.slice(0, 19).replace('T', ' ') : '-'],
      ['Atualizado em', data.updated_at ? data.updated_at.slice(0, 19).replace('T', ' ') : '-'],
    ];
    function _sel(id, val, opts) {
      var h = '<select class="form-select form-select-sm" id="' + id + '"><option value="">-</option>';
      opts.forEach(function(o) { h += '<option' + (o === val ? ' selected' : '') + '>' + o + '</option>'; });
      return h + '</select>';
    }
    var readonly = [
      ['Ano', data.year],
      ['KM', data.mileage != null ? data.mileage.toLocaleString('pt-BR') : '-'],
      ['Combustível', data.fuel],
      ['Cor', data.color],
      ['Vendedor', data.seller_name],
      ['Tipo Vendedor', data.seller_type],
      ['Data anúncio', data.listing_date ? data.listing_date.slice(0, 10) : '-'],
      ['CEP', data.zip_code],
      ['Criado em', data.created_at ? data.created_at.slice(0, 19).replace('T', ' ') : '-'],
      ['Atualizado em', data.updated_at ? data.updated_at.slice(0, 19).replace('T', ' ') : '-'],
    ];
    var html = '<div class="row g-2 mb-3">';
    html += '<div class="col-12"><h6 class="fw-bold mb-2" style="font-size:0.85em;">Campos editáveis</h6></div>';
    html += '<div class="col-md-6"><label class="small text-muted">Marca</label><input class="form-control form-control-sm" id="det-edit-brand" value="' + (data.brand || '') + '"></div>';
    html += '<div class="col-md-6"><label class="small text-muted">Modelo</label><input class="form-control form-control-sm" id="det-edit-model" value="' + (data.model || '') + '"></div>';
    html += '<div class="col-md-4"><label class="small text-muted">Tipo</label>' + _sel('det-edit-cartype', data.cartype, ['Buggy','Caminhão Leve','Conversível','Coupé','Hatch','Perua','Pick-up','Sedã','SUV','Van/Utilitário']) + '</div>';
    html += '<div class="col-md-4"><label class="small text-muted">Motor</label>' + _sel('det-edit-motor', data.motorpower, ['1.0','1.2','1.3','1.4','1.5','1.6','1.7','1.8','1.9','2.0 - 2.9','3.0 - 3.9','4.0 ou mais']) + '</div>';
    html += '<div class="col-md-4"><label class="small text-muted">Câmbio</label>' + _sel('det-edit-trans', data.transmission, ['Manual','Automático','Semi-Automático','Automatizado']) + '</div>';
    html += '<div class="mt-2 mb-3"><button class="btn btn-primary btn-sm" onclick="saveDetailsData()">Salvar alterações</button></div>';
    html += '</div>';
    html += '<div class="row g-2 mb-3">';
    html += '<div class="col-12"><h6 class="fw-bold mb-2" style="font-size:0.85em;">Informações adicionais</h6></div>';
    for (var i = 0; i < readonly.length; i++) {
      var val = readonly[i][1] || '-';
      html += '<div class="col-md-4"><div class="p-2 bg-light rounded" style="font-size:0.85em;"><span class="fw-bold text-muted">' + readonly[i][0] + ':</span> <span>' + val + '</span></div></div>';
    }
    html += '</div>';
    document.getElementById('det-data-table').innerHTML = html;
  }).catch(function() {
    document.getElementById('detailsLoading').innerHTML = '<p class="text-danger">Erro ao carregar dados.</p>';
    document.getElementById('det-force-btn').disabled = false;
  });
}
function detailsFav() {
  var id = currentDetailsDbId;
  var favIcon = document.getElementById('fav-' + id);
  var isFav = favIcon && favIcon.style.color === 'red';
  fetch('/' + (isFav ? 'unfavorite' : 'favorite') + '/' + id, { method: 'POST' }).then(function() {
    if (favIcon) { favIcon.style.color = isFav ? '#ccc' : 'red'; }
    var btn = document.getElementById('det-fav-btn');
    btn.textContent = isFav ? '♡ Favoritar' : '♥ Favoritado';
  });
}
function detailsIgnore() {
  if (!confirm('Ignorar este anúncio? Ele não aparecerá mais nas listas.')) return;
  window.location.href = '/ignore/' + currentDetailsDbId;
}
function saveNotes() {
  var fd = new FormData();
  fd.set('notes', document.getElementById('det-notes').value);
  fetch('/edit/' + currentDetailsDbId, { method: 'POST', body: fd }).then(function() {
    openDetails(currentDetailsOlxId, currentDetailsDbId, false);
  });
}
function saveDetailsData() {
  var fd = new FormData();
  fd.set('brand', document.getElementById('det-edit-brand').value);
  fd.set('model', document.getElementById('det-edit-model').value);
  fd.set('cartype', document.getElementById('det-edit-cartype').value);
  fd.set('motorpower', document.getElementById('det-edit-motor').value);
  fd.set('transmission', document.getElementById('det-edit-trans').value);
  fetch('/edit/' + currentDetailsDbId, { method: 'POST', body: fd }).then(function() {
    openDetails(currentDetailsOlxId, currentDetailsDbId, false);
  });
}
</script>
