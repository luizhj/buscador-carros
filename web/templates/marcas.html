<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marcas — Carros OLX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Marcas</h1>
  <a href="/" class="btn btn-outline-secondary mb-2">&larr; Voltar para listagem</a>
  <a href="/modelos" class="btn btn-outline-info mb-2">Todos os modelos</a>
  <div class="row g-3">
    {% for brand, count in marcas %}
    <div class="col-md-4 col-lg-3">
      <div class="card shadow-sm h-100">
        <a href="/marcas/{{ brand }}" class="text-decoration-none">
          <div class="card-body text-center pb-1">
            <h5 class="card-title">{{ brand }}</h5>
            <span class="badge bg-primary">{{ count }} anúncio{{ 's' if count != 1 }}</span>
          </div>
        </a>
        <div class="card-footer bg-transparent text-center border-0 pt-0 pb-2">
          <form method="POST" action="/blacklist/add" style="display:inline">
            <input type="hidden" name="brand" value="{{ brand }}">
            <button type="submit" class="btn btn-outline-dark btn-sm" onclick="return confirm('Adicionar {{ brand }} na blacklist? Todos os anúncios desta marca serão ignorados no próximo scrape.')">Blacklist</button>
          </form>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
