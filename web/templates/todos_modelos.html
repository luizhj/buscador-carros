<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todos os Modelos — Carros OLX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Todos os Modelos</h1>
  <a href="/marcas" class="btn btn-outline-secondary mb-2">&larr; Voltar para marcas</a>
  <a href="/" class="btn btn-outline-secondary mb-2">Listagem</a>
  <div class="list-group">
    {% for brand, model, count in modelos %}
    <a href="/?q={{ model }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span>{{ brand }} <strong>{{ model }}</strong></span>
      <span class="badge bg-primary rounded-pill">{{ count }}</span>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
